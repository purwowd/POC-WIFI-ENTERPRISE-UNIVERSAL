ctrl_interface=/run/wpa_supplicant
update_config=0
ap_scan=1

# Enable 802.11u / Hotspot 2.0 network selection in wpa_supplicant.
interworking=1
hs20=1
auto_interworking=1

# Passpoint-style credential hint. Replace the dummy IMSI with a lab SIM IMSI
# when testing Linux + SIM reader. Do not commit a real subscriber IMSI.
cred={
    realm="wlan.mnc010.mcc510.3gppnetwork.org"
    imsi="510100000000000"
    eap=SIM
}

network={
    ssid="LAB-HS20"
    key_mgmt=WPA-EAP
    eap=SIM
    identity="1510100000000000"
    anonymous_identity="anonymous@wlan.mnc010.mcc510.3gppnetwork.org"

    # Uncomment when using a SIM reader that requires PIN.
    # pin="1234"

    # If your wpa_supplicant build uses PC/SC for SIM access, configure pcsc
    # according to the local smart-card stack.
    # pcsc=""
}
