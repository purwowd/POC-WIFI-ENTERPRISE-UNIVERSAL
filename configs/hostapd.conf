driver=nl80211
interface=wlan1
ssid=LAB-ENTERPRISE

hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

country_code=ID
ieee80211d=1
ieee80211h=1

logger_syslog=-1
logger_syslog_level=0
logger_stdout=-1
logger_stdout_level=0
debug=2

auth_algs=1
wpa=2
wpa_key_mgmt=WPA-EAP
rsn_pairwise=CCMP
ieee8021x=1

# Forward 802.1X auth to RADIUS
auth_server_addr=10.88.0.10
auth_server_port=1812
auth_server_shared_secret=labsecret

acct_server_addr=10.88.0.10
acct_server_port=1813
acct_server_shared_secret=labsecret

ieee8021x=1
eapol_version=2

