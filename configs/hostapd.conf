driver=nl80211
interface=wlan1
ssid=LAB-HS20

hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

country_code=ID
ieee80211d=1
ieee80211h=1

logger_syslog=-1
logger_syslog_level=0
logger_stdout=-1
logger_stdout_level=0
debug=2

auth_algs=1
wpa=2
wpa_key_mgmt=WPA-EAP WPA-EAP-SHA256
rsn_pairwise=CCMP
ieee8021x=1

# Forward 802.1X auth to RADIUS.
auth_server_addr=10.88.0.10
auth_server_port=1812
auth_server_shared_secret=labsecret

acct_server_addr=10.88.0.10
acct_server_port=1813
acct_server_shared_secret=labsecret

eapol_version=2

# 802.11u / Hotspot 2.0 advertisement for Passpoint discovery.
# Match these values with the client Passpoint credential and EAP-SIM backend.
interworking=1
access_network_type=2
internet=1
asra=0
esr=0
uesa=0

venue_group=2
venue_type=8
venue_name=eng:Security Research Lab
domain_name=wlan.mnc010.mcc510.3gppnetwork.org,mnc010.mcc510.3gppnetwork.org

# Telkomsel PLMN: MCC 510 / MNC 10. This only advertises network selection
# metadata; authentication still needs a valid operator/carrier AAA path.
anqp_3gpp_cell_net=510,10

# EAP types: 18=SIM, 23=AKA, 50=AKA'. Auth param 5:6 = SIM,
# 5:7 = USIM. Advertising all three gives Android carrier matching more room.
nai_realm=0,wlan.mnc010.mcc510.3gppnetwork.org,18[5:6],23[5:7],50[5:7]
nai_realm=0,mnc010.mcc510.3gppnetwork.org,18[5:6],23[5:7],50[5:7]

hs20=1
disable_dgaf=1
hs20_oper_friendly_name=eng:Telkomsel Lab
hs20_wan_metrics=01:8000:1000:80:240:3000

